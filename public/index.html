<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TabSync - Local Browser Sync</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --bg-main: #f8fafc;
      --bg-panel: #ffffff;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --github: #24292f;
      --coffee: #ffdd00;
      --radius: 12px;
    }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-main);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
      flex: 1;
      width: 100%;
      box-sizing: border-box;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.25rem;
      margin-bottom: 2.5rem;
    }

    h2 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    #status {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg-panel);
      padding: 0.4rem 0.8rem;
      border-radius: 30px;
      border: 1px solid var(--border);
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    #addUrlForm {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2.5rem;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      padding: 0.375rem;
      border-radius: var(--radius);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #addUrlForm:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15), 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    input {
      flex: 1;
      padding: 0.625rem 0.875rem;
      border: none;
      background: transparent;
      font-size: 0.95rem;
      outline: none;
      color: var(--text-main);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 0.625rem 1.5rem;
      border-radius: calc(var(--radius) - 4px);
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover {
      background: var(--primary-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    /* Unified Dashboard Panel Layout */
    .dashboard-panel {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
      overflow: hidden;
    }

    #devices {
      display: grid;
      grid-template-columns: 1fr;
    }

    /* CSS Empty State pattern when no content exists inside #devices */
    #devices:empty::after {
      content: "No devices connected yet. Searching for device..";
      display: block;
      padding: 3rem 1.5rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .device {
      padding: 1.75rem;
      box-sizing: border-box;
    }

    /* Mobile: Separate stacked devices with a bottom border */
    .device:not(:last-child) {
      border-bottom: 1px solid var(--border);
    }

    .device h3 {
      margin: 0 0 1.25rem 0;
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .tabs {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .tabs a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-decoration: none;
      color: var(--text-main);
      padding: 0.75rem 0.75rem;
      font-size: 0.95rem;
      word-break: break-all;
      transition: background 0.15s, color 0.15s;
      border-radius: 8px;
    }

    .tabs a:hover {
      background: var(--bg-main);
      color: var(--primary);
    }

    .tabs a::after {
      content: "→";
      font-weight: 700;
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.15s, transform 0.15s;
      color: var(--primary);
      padding-left: 0.75rem;
    }

    .tabs a:hover::after {
      opacity: 1;
      transform: translateX(0);
    }

    /* Support Footer */
    footer {
      background: var(--bg-panel);
      border-top: 1px solid var(--border);
      padding: 1.5rem 1rem;
      text-align: center;
      margin-top: auto;
    }

    .footer-content {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .footer-text {
      font-size: 0.875rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .footer-links {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .support-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.85rem;
      border-radius: 8px;
      font-size: 0.825rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .btn-github {
      background: #f1f5f9;
      color: var(--text-main);
    }

    .btn-github:hover {
      background: #e2e8f0;
    }

    .btn-sponsor {
      background: #fef2f2;
      color: #ef4444;
    }

    .btn-sponsor:hover {
      background: #fee2e2;
    }

    .btn-coffee {
      background: #fffbeb;
      color: #b45309;
      border: 1px solid #fde68a;
    }

    .btn-coffee:hover {
      background: #fef3c7;
    }

    /* Screen sizes adaptive styling */
    @media (min-width: 640px) {
      #devices {
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      }

      /* Desktop: Remove the bottom border and add a crisp vertical partition instead */
      .device:not(:last-child) {
        border-bottom: none;
        border-right: 1px solid var(--border);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <header>
      <h2>🧩 TabSync Local</h2>
      <div id="status">Connecting...</div>
    </header>

    <form id="addUrlForm">
      <input type="text" id="urlInput" placeholder="Paste a URL to sync..." required />
      <button type="submit">Sync Link</button>
    </form>

    <div class="dashboard-panel">
      <div id="devices"></div>
    </div>
  </div>

      <div class="footer-text">Support open development!</div>

      </div>
    </div>
  </footer>

  <script>
    let deviceId =
      localStorage.getItem("deviceId") ||
      `device-${Math.random().toString(36).slice(2, 8)}`;
    localStorage.setItem("deviceId", deviceId);

    let ws;
    let serverIP = null;
    const devicesDiv = document.getElementById("devices");
    const statusEl = document.getElementById("status");

    async function init() {
      try {
        const res = await fetch("/ip");
        const data = await res.json();
        serverIP = data.ip;
        const wsUrl = `ws://${data.ip}:${data.wsPort}`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => (statusEl.textContent = "✅ Connected");
        ws.onclose = () => (statusEl.textContent = "⚠️ Disconnected");
        ws.onmessage = (e) => renderDevices(JSON.parse(e.data));
      } catch {
        statusEl.textContent = "⚠️ Connection Failed";
      }
    }

    function renderDevices(devices) {
      devicesDiv.innerHTML = "";
      for (const [id, tabs] of Object.entries(devices)) {
        const deviceEl = document.createElement("div");
        deviceEl.className = "device";
        const title =
          id === deviceId ? `💻 ${id} (You)` : id.startsWith("device-") ? `📱 ${id}` : id;
        deviceEl.innerHTML = `<h3>${title}</h3><div class="tabs"></div>`;
        const tabsDiv = deviceEl.querySelector(".tabs");

        const sortedTabs = [...tabs].sort((a, b) => (a.title || "").localeCompare(b.title || ""));

        sortedTabs.forEach((tab) => {
          const a = document.createElement("a");
          a.href = tab.url;
          a.target = "_blank";
          a.textContent = tab.title || tab.url;
          tabsDiv.appendChild(a);
        });
        devicesDiv.appendChild(deviceEl);
      }
    }

    document
      .getElementById("addUrlForm")
      .addEventListener("submit", async (e) => {
        e.preventDefault();
        const urlInput = document.getElementById("urlInput");
        let url = urlInput.value.trim();
        if (!url) return;

        if (!url.startsWith("http")) url = "https://" + url;

        try {
          const res = await fetch("/add", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ deviceId, url }),
          });
          const data = await res.json();
          if (data.success) {
            statusEl.textContent = `✅ Added: ${data.title || "Link"}`;
            urlInput.value = "";
          } else {
            statusEl.textContent = "❌ Failed to add URL";
          }
        } catch {
          statusEl.textContent = "⚠️ Server not reachable";
        }
      });

    init();
  </script>
</body>

</html>
